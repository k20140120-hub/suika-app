<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🍉 スイカ栽培管理</title>
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#3a7a28">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="スイカ管理">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --red:#f03a3a; --gold:#ffaa00; --green:#44b840; --blue:#3888e8; --gray:#a0a898;
    --bg:#fff6f0; --card:#ffffff; --ink:#2a2420; --sub:#9a8878;
    --accent:#52b030; --accent2:#78d050;
    --surface:#ffeee6; --border:#f0ddd4;
    --header-from:#5aba32; --header-to:#2e8010;
    --pink:#ff7eb3; --yellow:#ffe040;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{
    margin:0;
    font-family:'M PLUS Rounded 1c',-apple-system,"Hiragino Sans",sans-serif;
    background:var(--bg);color:var(--ink);
    padding-bottom:72px;
    font-size:14px;line-height:1.5;
  }
  /* 背景 - やわらかいストライプ模様 */
  body::before{
    content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
    background:repeating-linear-gradient(
      -45deg,
      transparent,transparent 40px,
      rgba(255,200,100,.04) 40px,rgba(255,200,100,.04) 41px
    );
  }

  /* ===== ヘッダー ===== */
  header{
    background:linear-gradient(135deg,#6ad040 0%,#44b020 50%,#2e9010 100%);
    color:#fff;padding:12px 16px 14px;
    position:sticky;top:0;z-index:20;
    box-shadow:0 4px 16px rgba(60,150,20,.35);
    overflow:hidden;
  }
  /* スイカの縞模様（装飾） */
  header::after{
    content:'';position:absolute;top:-30px;right:-20px;
    width:120px;height:120px;border-radius:50%;
    background:rgba(255,255,255,.07);
    pointer-events:none;
  }
  .header-row1{display:flex;align-items:center;justify-content:space-between;position:relative;}
  header h1{
    margin:0;font-size:20px;font-weight:900;letter-spacing:.5px;
    display:flex;align-items:center;gap:8px;
    text-shadow:0 2px 4px rgba(0,0,0,.15);
  }
  .header-date{
    font-size:12px;font-weight:700;
    background:rgba(255,255,255,.2);border-radius:20px;padding:3px 10px;
    backdrop-filter:blur(4px);
  }
  .header-row2{display:flex;align-items:center;justify-content:space-between;margin-top:10px;position:relative;}
  .temp-block{display:flex;align-items:baseline;gap:6px;}
  .temp-val{
    font-size:30px;font-weight:900;cursor:pointer;letter-spacing:-.5px;
    background:rgba(255,255,255,.15);border-radius:14px;padding:2px 10px;
    line-height:1.2;transition:transform .1s;
  }
  .temp-val:active{transform:scale(.92);}
  .temp-label{font-size:11px;opacity:.85;font-weight:700;}
  .loc{font-size:11px;font-weight:700;opacity:.9;display:flex;align-items:center;gap:3px;
    background:rgba(255,255,255,.15);border-radius:20px;padding:3px 10px;}

  /* ===== サマリー ===== */
  .summary{
    display:grid;grid-template-columns:repeat(4,1fr);
    gap:8px;padding:12px 12px 8px;position:relative;z-index:1;
  }
  .summary .box{
    background:var(--card);border-radius:20px;
    padding:12px 4px 10px;text-align:center;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
    border:2.5px solid transparent;
    transition:transform .12s;
  }
  .summary .box:active{transform:scale(.95);}
  .summary .box .ico{font-size:18px;line-height:1;margin-bottom:2px;}
  .summary .box .num{font-size:24px;font-weight:900;line-height:1;letter-spacing:-.5px;}
  .summary .box .lbl{font-size:9px;color:var(--sub);margin-top:3px;font-weight:700;}
  .summary .box.red{border-color:#ffb3ae;background:linear-gradient(160deg,#fff0ef,#fff);}
  .summary .box.red .num{color:var(--red);}
  .summary .box.gold{border-color:#ffe090;background:linear-gradient(160deg,#fffbe8,#fff);}
  .summary .box.gold .num{color:#cc8800;}
  .summary .box.green{border-color:#a8e8a0;background:linear-gradient(160deg,#f0ffe8,#fff);}
  .summary .box.green .num{color:var(--green);}

  /* ===== ツールバー（後方互換） ===== */
  .toolbar{display:flex;gap:6px;padding:4px 12px 10px;flex-wrap:wrap;}
  .toolbar button{font-size:12px;font-weight:700;padding:8px 14px;border-radius:20px;border:2px solid var(--border);background:var(--card);color:var(--ink);cursor:pointer;transition:all .12s;}
  .toolbar button:active{transform:scale(.96);}
  .toolbar button.primary,.toolbar button.view-active{background:var(--accent);color:#fff;border-color:var(--accent);}
  .toolbar-sep{width:1px;height:24px;background:var(--border);margin:0 2px;flex:0 0 auto;}
  .toolbar-danger{color:var(--red)!important;border-color:#ffc8c0!important;}

  /* ===== 区画ナビ ===== */
  .block-nav{
    display:flex;gap:6px;padding:8px 12px 6px;
    overflow-x:auto;position:relative;z-index:1;
  }
  .block-nav::-webkit-scrollbar{display:none;}
  .block-btn{
    position:relative;display:flex;align-items:center;gap:4px;
    padding:6px 14px;border-radius:20px;
    border:2px solid var(--border);
    background:var(--card);font-size:12px;font-weight:800;
    cursor:pointer;color:var(--sub);white-space:nowrap;flex:0 0 auto;
    transition:all .12s;box-shadow:0 2px 6px rgba(0,0,0,.06);
  }
  .block-btn:active{transform:scale(.94);}
  .block-btn .icon{font-size:14px;}
  .block-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);
    box-shadow:0 4px 12px rgba(80,176,48,.4);}
  .block-btn .dot{position:absolute;top:-4px;right:-4px;width:11px;height:11px;border-radius:50%;background:var(--red);border:2.5px solid var(--bg);}

  /* ===== 株カード ===== */
  .plant-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;padding:8px 12px;position:relative;z-index:1;}
  .plant-card{
    border-radius:24px;padding:0;overflow:hidden;
    box-shadow:0 4px 16px rgba(0,0,0,.1);
    cursor:pointer;background:var(--card);
    transition:transform .12s,box-shadow .12s;
    border:none;
  }
  .plant-card:active{transform:scale(.96);box-shadow:0 2px 8px rgba(0,0,0,.08);}
  .plant-card.pulse{animation:pulseRed 1.8s infinite;}
  @keyframes pulseRed{
    0%{box-shadow:0 4px 16px rgba(240,58,58,.0);}
    50%{box-shadow:0 4px 24px rgba(240,58,58,.5);}
    100%{box-shadow:0 4px 16px rgba(240,58,58,.0);}
  }
  /* 古いcard-strip互換 */
  .card-strip{height:5px;width:100%;}
  .grad-red .card-strip{background:var(--red);}
  .grad-gold .card-strip{background:var(--gold);}
  .grad-green .card-strip{background:var(--green);}
  .grad-blue .card-strip{background:var(--blue);}
  .grad-gray .card-strip{background:#d0d4cc;}
  .plant-card .cardtop{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:6px;}
  .plant-card .badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;color:#fff;border-radius:20px;padding:3px 8px;align-self:flex-start;}
  .badge.red{background:var(--red);}
  .badge.gold{background:var(--gold);}
  .badge.green{background:var(--green);}
  .badge.blue{background:var(--blue);}
  .badge.gray{background:var(--gray);}
  .vine-row{display:flex;align-items:center;gap:4px;margin-top:4px;}
  .vine-label{font-size:9px;font-weight:800;color:#fff;background:var(--accent);border-radius:4px;width:16px;height:14px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .flower-dots{display:flex;gap:3px;flex-wrap:wrap;}
  .dot-flower{width:16px;height:16px;border-radius:50%;font-size:9px;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;}
  .dot-flower.red{background:var(--red);}
  .dot-flower.gold{background:var(--gold);}
  .dot-flower.green{background:var(--green);}
  .dot-flower.blue{background:var(--blue);}
  .dot-flower.gray{background:var(--gray);}
  .gauge-wrap{position:relative;width:44px;height:44px;flex:0 0 auto;}
  .gauge-wrap svg{display:block;}
  .gauge-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:var(--ink);}
  .accum-text{font-size:10px;color:var(--sub);margin-top:4px;font-weight:600;}
  .card-body{padding:10px 12px 10px;}
  .plant-card .pname{font-weight:900;font-size:15px;}
  .plant-card .ptag{display:inline-block;font-size:10px;font-weight:800;color:var(--accent);background:#e8ffe0;border-radius:8px;padding:2px 6px;margin-top:2px;}

  .empty{padding:56px 24px;text-align:center;color:var(--sub);font-size:14px;line-height:1.8;position:relative;z-index:1;}
  .empty::before{content:"🌱";display:block;font-size:52px;margin-bottom:12px;}

  /* ===== モーダル ===== */
  .overlay{position:fixed;inset:0;background:rgba(30,50,20,.45);display:none;align-items:flex-end;justify-content:center;z-index:50;backdrop-filter:blur(4px);}
  .overlay.show{display:flex;}
  .sheet{background:#fff;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;border-radius:28px 28px 0 0;padding:0;box-shadow:0 -8px 32px rgba(0,0,0,.18);}
  .sheet-handle{width:40px;height:5px;background:#e0e8d8;border-radius:3px;margin:14px auto 0;}
  .sheet-inner{padding:14px 18px 32px;}
  .sheet h2{margin:0 0 16px;font-size:18px;font-weight:900;}
  .sheet .close-btn{float:right;border:none;background:#f0f8e8;width:30px;height:30px;border-radius:50%;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--sub);font-weight:700;}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:11px;font-weight:800;color:var(--sub);margin-bottom:5px;letter-spacing:.5px;}
  .field input,.field select,.field textarea{width:100%;padding:10px 12px;border:2px solid var(--border);border-radius:14px;font-size:14px;font-family:inherit;background:#fafdf8;transition:border-color .12s;}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent);background:#fff;}
  .vine-toggle{display:flex;gap:8px;margin-bottom:12px;}
  .vine-toggle button{flex:1;padding:10px;border-radius:14px;border:2px solid var(--border);background:#fafdf8;font-size:13px;font-weight:800;cursor:pointer;transition:all .12s;font-family:inherit;}
  .vine-toggle button.active{background:var(--accent);color:#fff;border-color:var(--accent);}
  .flower-tabs{display:flex;gap:6px;overflow-x:auto;margin-bottom:12px;padding-bottom:2px;}
  .flower-tab{flex:0 0 auto;padding:7px 14px;border-radius:20px;border:2px solid var(--border);background:#fafdf8;font-size:12px;font-weight:800;cursor:pointer;transition:all .12s;font-family:inherit;}
  .flower-tab.active{background:var(--accent);color:#fff;border-color:var(--accent);}
  .row2{display:flex;gap:8px;}
  .row2>.field{flex:1;}
  .status-pill{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:800;color:#fff;border-radius:20px;padding:5px 12px;}
  .help-text{font-size:12px;color:var(--sub);background:#f5fff0;border-radius:14px;padding:10px 14px;margin-bottom:12px;line-height:1.7;border:1.5px solid #d0f0c0;}

  /* ===== 一括編集テーブル ===== */
  table.bulk{width:100%;border-collapse:collapse;font-size:10px;}
  table.bulk th,table.bulk td{border:1px solid var(--border);padding:4px;text-align:center;}
  table.bulk th{background:#f5fff0;position:sticky;top:0;font-weight:800;font-size:9px;}
  table.bulk input[type=date]{width:84px;font-size:9px;}
  table.bulk input[type=text]{width:48px;font-size:9px;}
  table.bulk select{font-size:9px;width:50px;}
  .bulk-wrap{overflow-x:auto;padding:0 12px;}
  .plantname-cell{white-space:nowrap;font-weight:900;}

  /* ===== ボトムナビ ===== */
  .bottom-nav{
    position:fixed;bottom:0;left:0;right:0;height:64px;
    background:#fff;border-top:none;
    display:flex;z-index:30;
    border-radius:24px 24px 0 0;
    box-shadow:0 -4px 24px rgba(60,150,20,.15);
    padding:0 8px;
  }
  .nav-btn{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:2px;border:none;background:none;cursor:pointer;
    color:#b8c8b0;padding:8px 0;
    transition:color .15s;font-family:inherit;position:relative;
  }
  .nav-btn .nav-icon{font-size:24px;line-height:1;transition:transform .15s;}
  .nav-btn .nav-label{font-size:10px;font-weight:800;letter-spacing:.3px;}
  .nav-btn.active{color:var(--accent);}
  .nav-btn.active .nav-icon{transform:scale(1.15);}
  .nav-btn.active::before{
    content:'';position:absolute;top:6px;
    width:40px;height:40px;border-radius:14px;
    background:rgba(80,176,48,.12);
  }
  .nav-btn .nav-badge{position:absolute;top:5px;right:20%;width:9px;height:9px;border-radius:50%;background:var(--red);border:2.5px solid #fff;}

  /* ===== FAB ===== */
  .fab{
    position:fixed;right:18px;bottom:76px;
    width:58px;height:58px;border-radius:50%;
    background:linear-gradient(135deg,#70d848,#3a9820);
    color:#fff;border:none;font-size:30px;
    cursor:pointer;
    box-shadow:0 6px 20px rgba(80,176,48,.5),0 0 0 4px rgba(80,176,48,.15);
    display:flex;align-items:center;justify-content:center;
    z-index:25;transition:transform .15s,box-shadow .15s;
    animation:fabBounce 2.5s ease-in-out infinite;
  }
  .fab:active{transform:scale(.88);box-shadow:0 3px 10px rgba(80,176,48,.3);}
  @keyframes fabBounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);}}

  /* ===== 収穫アラート ===== */
  .harvest-alert{
    margin:10px 12px 0;border-radius:20px;
    background:linear-gradient(135deg,#ff6060,#e81818);
    color:#fff;padding:12px 16px;
    display:flex;align-items:center;gap:10px;
    box-shadow:0 4px 16px rgba(240,58,58,.4);
    cursor:pointer;animation:pulseRed 1.8s infinite;
  }
  .harvest-alert .alert-icon{font-size:28px;flex:0 0 auto;}
  .harvest-alert .alert-text .alert-title{font-weight:900;font-size:15px;}
  .harvest-alert .alert-text .alert-sub{font-size:12px;opacity:.92;margin-top:2px;font-weight:700;}
  .harvest-alert .alert-arrow{margin-left:auto;font-size:20px;opacity:.9;}

  /* ===== 管理パネル ===== */
  .manage-wrap{padding:12px;position:relative;z-index:1;}
  .manage-section{background:var(--card);border-radius:24px;overflow:hidden;margin-bottom:14px;box-shadow:0 4px 16px rgba(0,0,0,.08);}
  .manage-section-title{font-size:11px;font-weight:900;color:var(--sub);text-transform:uppercase;letter-spacing:1px;padding:14px 18px 8px;}
  .manage-row{display:flex;align-items:center;gap:12px;padding:14px 18px;border-top:1px solid #f5f5f0;cursor:pointer;transition:background .1s;}
  .manage-row:first-of-type{border-top:none;}
  .manage-row:active{background:#f8fff4;}
  .manage-row .row-icon{font-size:24px;flex:0 0 auto;width:34px;text-align:center;}
  .manage-row .row-info .row-title{font-size:14px;font-weight:800;}
  .manage-row .row-info .row-sub{font-size:11px;color:var(--sub);margin-top:2px;font-weight:600;}
  .manage-row .row-arrow{margin-left:auto;color:#d0d8c8;font-size:18px;font-weight:700;}
  .manage-row.danger .row-title{color:var(--red);}
  .temp-manage{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-top:1px solid #f5f5f0;}
  .temp-manage .tm-val{font-size:32px;font-weight:900;color:var(--ink);letter-spacing:-.5px;}
  .temp-manage .tm-label{font-size:11px;color:var(--sub);margin-top:2px;font-weight:700;}
  .temp-manage .tm-btn{padding:8px 16px;border-radius:20px;border:2px solid var(--border);background:#f5fff0;font-size:12px;font-weight:800;cursor:pointer;color:var(--ink);font-family:inherit;}

  /* ===== 株カード（新デザイン）重複解消 ===== */
  .plant-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;padding:8px 12px;position:relative;z-index:1;}
  .plant-card{
    border-radius:24px;overflow:hidden;
    box-shadow:0 6px 20px rgba(0,0,0,.1);
    cursor:pointer;background:var(--card);
    transition:transform .12s;
    display:flex;flex-direction:column;
  }
  .plant-card:active{transform:scale(.96);}
  /* ===== 株カード（新デザイン） ===== */
  .card-head{
    padding:14px 14px 12px;
    display:flex;flex-direction:column;gap:3px;
    position:relative;overflow:hidden;
  }
  .card-head::after{
    content:'';position:absolute;top:-16px;right:-16px;
    width:64px;height:64px;border-radius:50%;
    background:rgba(255,255,255,.12);pointer-events:none;
  }
  .card-head.red{background:linear-gradient(135deg,#ff5a5a,#e82020);}
  .card-head.gold{background:linear-gradient(135deg,#ffc830,#e09000);}
  .card-head.green{background:linear-gradient(135deg,#58d040,#28a010);}
  .card-head.blue{background:linear-gradient(135deg,#4898f8,#1868d8);}
  .card-head.gray{background:linear-gradient(135deg,#a0a8a0,#708070);}
  .card-no{font-size:28px;font-weight:900;color:#fff;line-height:1;text-shadow:0 2px 4px rgba(0,0,0,.2);}
  .card-group-tag{font-size:11px;font-weight:800;color:rgba(255,255,255,.85);}
  .card-status-row{display:flex;align-items:center;gap:5px;margin-top:8px;}
  .card-status-icon{font-size:16px;}
  .card-status-text{font-size:12px;font-weight:900;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.15);}
  .card-body{padding:10px 12px 12px;}
  .card-vine-row{display:flex;align-items:center;gap:4px;margin-bottom:5px;}
  .card-vine-lbl{font-size:9px;font-weight:900;color:#fff;background:var(--accent);border-radius:6px;padding:1px 5px;flex:0 0 auto;}
  .card-dots{display:flex;gap:4px;flex-wrap:wrap;}
  .card-dot{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:900;color:#fff;border:2px solid rgba(255,255,255,.5);}
  .card-dot.red{background:var(--red);}
  .card-dot.gold{background:var(--gold);}
  .card-dot.green{background:var(--green);}
  .card-dot.blue{background:var(--blue);}
  .card-dot.gray{background:#c0c8c0;}
  .card-accum{font-size:10px;color:var(--sub);font-weight:700;margin-top:4px;}

  /* ===== 同期ステータスドット ===== */
  .sync-dot{width:10px;height:10px;border-radius:50%;flex:0 0 auto;border:2px solid rgba(255,255,255,.5);transition:background .3s;}
  .sync-dot.offline{background:rgba(255,255,255,.4);}
  .sync-dot.syncing{background:#ffe040;animation:syncPulse .8s infinite;}
  .sync-dot.ok{background:#80ff80;}
  .sync-dot.error{background:#ff8080;}
  @keyframes syncPulse{0%,100%{opacity:1;}50%{opacity:.3;}}

  .empty-cta{display:inline-block;margin-top:14px;padding:12px 28px;border-radius:24px;background:var(--accent);color:#fff;font-size:14px;font-weight:900;cursor:pointer;border:none;box-shadow:0 4px 14px rgba(80,176,48,.4);font-family:inherit;}

  /* ===== 圃場マップ ===== */
  .map-wrap{padding:10px 12px 80px;}
  .map-compass{display:flex;align-items:center;justify-content:center;margin-bottom:12px;}
  .map-compass .cmp-w{flex:1;text-align:right;padding-right:10px;font-size:12px;font-weight:900;color:#8a9870;}
  .map-compass .cmp-e{flex:1;text-align:left;padding-left:10px;font-size:12px;font-weight:900;color:#8a9870;}
  .map-compass .cmp-center{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center;}
  .map-legend-dot{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;color:var(--sub);}
  .map-legend-dot span{width:13px;height:13px;border-radius:50%;display:inline-block;border:2.5px solid rgba(255,255,255,.85);box-shadow:0 1px 4px rgba(0,0,0,.15);}
  .map-group{margin-bottom:24px;}
  .map-group-title{
    font-size:15px;font-weight:900;color:#3a6018;
    margin:0 0 10px;padding:8px 16px;
    background:linear-gradient(135deg,rgba(255,255,255,.95),rgba(230,255,200,.8));
    border-radius:18px;display:flex;align-items:center;gap:8px;
    box-shadow:0 3px 10px rgba(80,160,40,.12);
    border:2px solid rgba(160,220,100,.35);
  }

  /* 畑レーン — スイカ畑の芝生風 */

  /* 株番号 — スイカゲームのフルーツ風 */

<script>
/* ===================== 定数 ===================== */
const DEFAULT_TARGET = 800;
const LAT = 34.930, LON = 137.165;
const STORE_KEY = 'suikaAppData_v2';
const DB_URL_KEY = 'suikaFirebaseUrl';
const DEFAULT_DB_URL = 'https://suika-6313a-default-rtdb.asia-southeast1.firebasedatabase.app';
const VINES = ['西','東'];
const COLOR_PRIORITY = { red:4, gold:3, green:2, blue:1, gray:0 };
const STATUS_ICON = { '収穫適期':'🔴', 'まもなく':'🟡', '生育中':'🌱', '着果(日付未定)':'🌼', '収穫済み':'🍉', '落花・摘果':'💤', '未着果':'🌑' };

/* ===================== 状態 ===================== */
let state = { plants: [], tempLog: {} };
let currentBlock = 0;
let bulkMode = false;
let currentTab = 'list';
let detailPlantId = null;
let detailVine = '西';
let detailFlowerIdx = 0;
let dbUrl = localStorage.getItem(DB_URL_KEY) || DEFAULT_DB_URL;
let syncStatus = 'offline'; // 'offline' | 'syncing' | 'ok' | 'error'
let lastSyncTime = null;
let syncTimer = null;

/* ===================== データマイグレーション ===================== */
function migrateData(data){
  if(!data || typeof data !== 'object') return { plants:[], tempLog:{} };
  if(!data.plants) data.plants = [];
  if(!data.tempLog) data.tempLog = {};
  for(const p of data.plants){
    if(!p.vines) p.vines = { 西:[], 東:[], sub:[] };
    if(!p.vines.sub) p.vines.sub = Array.from({length:6}, () => ({mark:'none',date:'',harvested:false}));
    if(p.extraSide === undefined) p.extraSide = null;
  }
  return data;
}

/* ===================== ローカルストレージ ===================== */
function loadLocal(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    return raw ? migrateData(JSON.parse(raw)) : { plants:[], tempLog:{} };
  }catch(e){ return { plants:[], tempLog:{} }; }
}
function saveLocal(){ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }

/* ===================== Firebase REST ===================== */
function setSyncStatus(s){
  syncStatus = s;
  if(currentTab === 'manage') renderManage();
  // ヘッダーのステータスドット更新
  const dot = document.getElementById('syncDot');
  if(dot){
    dot.className = 'sync-dot ' + s;
    dot.title = {offline:'未接続', syncing:'同期中…', ok:'同期済み', error:'同期エラー'}[s] || '';
  }
}

async function loadRemote(){
  if(!dbUrl) return null;
  try{
    setSyncStatus('syncing');
    const res = await fetch(`${dbUrl}/suikaData.json`, { cache:'no-store' });
    if(!res.ok){ setSyncStatus('error'); return null; }
    const data = await res.json();
    setSyncStatus('ok');
    lastSyncTime = new Date();
    return data ? migrateData(data) : { plants:[], tempLog:{} };
  }catch(e){ setSyncStatus('error'); return null; }
}

async function saveRemote(){
  if(!dbUrl) return;
  try{
    setSyncStatus('syncing');
    const res = await fetch(`${dbUrl}/suikaData.json`, {
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(state)
    });
    setSyncStatus(res.ok ? 'ok' : 'error');
    if(res.ok) lastSyncTime = new Date();
  }catch(e){ setSyncStatus('error'); }
}

function saveData(){
  saveLocal();
  saveRemote();
}

async function syncFromRemote(){
  const remote = await loadRemote();
  if(!remote) return;
  state = remote;
  saveLocal();
  renderAll();
}

function startSync(){
  if(syncTimer) clearInterval(syncTimer);
  if(!dbUrl) return;
  syncTimer = setInterval(syncFromRemote, 30000);
  document.addEventListener('visibilitychange', () => {
    if(!document.hidden) syncFromRemote();
  });
}

async function connectDb(url){
  dbUrl = url.trim().replace(/\/+$/, '');
  localStorage.setItem(DB_URL_KEY, dbUrl);
  const remote = await loadRemote();
  if(remote){
    state = remote;
    saveLocal();
    startSync();
    renderAll();
    return true;
  }
  return false;
}

function disconnectDb(){
  dbUrl = '';
  localStorage.removeItem(DB_URL_KEY);
  if(syncTimer){ clearInterval(syncTimer); syncTimer = null; }
  setSyncStatus('offline');
}

/* ===================== 初期化 ===================== */
async function init(){
  // まずローカルデータで表示
  state = loadLocal();
  renderAll();
  fetchTemperature();

  // Firebase接続があれば同期
  if(dbUrl){
    const remote = await loadRemote();
    if(remote){
      state = remote;
      saveLocal();
      renderAll();
      startSync();
    }
  }

  // ServiceWorker
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  }
}

function emptyFruit(){ return { mark:'none', date:'', harvested:false }; }
function newPlant(id, no, group){
  return {
    id, no, group: group || '',
    target: DEFAULT_TARGET,
    extraSide: null,   // null=自動(奇数→西2本,偶数→東2本), '西'or'東'でミス方向上書き
    vines: {
      西: Array.from({length:6}, emptyFruit),
      東: Array.from({length:6}, emptyFruit),
      sub: Array.from({length:6}, emptyFruit),  // 3本目のツル
    }
  };
}
function plantLabel(p){ return `No.${p.no}`; }

/* ===================== 日付ユーティリティ ===================== */
function todayStr(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function dateRange(start, end){
  const out = [];
  let d = new Date(start+'T00:00:00');
  const e = new Date(end+'T00:00:00');
  while(d <= e){
    out.push(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'));
    d.setDate(d.getDate()+1);
  }
  return out;
}

/* ===================== 積算温度・ステータス判定 ===================== */
function computeAccum(dateStr){
  if(!dateStr) return 0;
  const days = dateRange(dateStr, todayStr());
  let sum = 0;
  for(const d of days){
    const rec = state.tempLog[d];
    if(rec != null) sum += (typeof rec === 'object' ? rec.value : rec);
  }
  return Math.round(sum*10)/10;
}
function fruitVisual(plant, fruit){
  if(fruit.harvested) return { label:'収穫済み', color:'gray', accum:0 };
  if(fruit.mark === 'x') return { label:'落花・摘果', color:'gray', accum:0 };
  if(fruit.date){
    const accum = computeAccum(fruit.date);
    if(accum >= plant.target) return { label:'収穫適期', color:'red', accum };
    if(accum >= plant.target*0.85) return { label:'まもなく', color:'gold', accum };
    return { label:'生育中', color:'green', accum };
  }
  if(fruit.mark === 'o') return { label:'着果(日付未定)', color:'blue', accum:0 };
  return { label:'未着果', color:'gray', accum:0 };
}
function gaugeSvg(ratio, color, size){
  size = size || 46;
  const stroke = 5, r = size/2 - stroke, c = size/2;
  const circ = 2*Math.PI*r;
  const offset = circ*(1-Math.max(0,Math.min(1,ratio)));
  const strokeColor = color === 'gray' ? '#bbb' : `var(--${color})`;
  return `<div class="gauge-wrap">
    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle cx="${c}" cy="${c}" r="${r}" stroke="#e6e6e6" stroke-width="${stroke}" fill="none"/>
      <circle cx="${c}" cy="${c}" r="${r}" stroke="${strokeColor}" stroke-width="${stroke}" fill="none"
        stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${offset.toFixed(1)}" stroke-linecap="round"
        transform="rotate(-90 ${c} ${c})"/>
    </svg>
    <div class="gauge-text">${Math.round(ratio*100)}%</div>
  </div>`;
}
function allFruits(plant){
  const out = [];
  for(const vine of VINES){
    plant.vines[vine].forEach((f,i) => out.push({ vine, idx:i, fruit:f }));
  }
  // 3本目のツル
  (plant.vines.sub||[]).forEach((f,i) => out.push({ vine:'sub', idx:i, fruit:f }));
  return out;
}
/* 受粉日・積算温度・残り日数予測 */
function estimatePlantInfo(plant){
  let best = null, bestAccum = -1;
  for(const {fruit} of allFruits(plant)){
    if(!fruit.date || fruit.mark==='x' || fruit.harvested) continue;
    const a = computeAccum(fruit.date);
    if(a > bestAccum){ bestAccum = a; best = fruit; }
  }
  if(!best) return null;
  const accum = Math.round(bestAccum);
  const remaining = plant.target - accum;
  // 直近7日の平均気温で残り日数を推定
  const today = todayStr();
  const temps = [];
  for(let i=0; i<7; i++){
    const d = new Date(today+'T00:00:00');
    d.setDate(d.getDate()-i);
    const key = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    const rec = state.tempLog[key];
    if(rec!=null) temps.push(typeof rec==='object'?rec.value:rec);
  }
  const avgTemp = temps.length ? temps.reduce((a,b)=>a+b,0)/temps.length : null;
  const daysLeft = (remaining > 0 && avgTemp) ? Math.ceil(remaining/avgTemp) : (remaining<=0 ? 0 : null);
  return { date: best.date, accum, remaining: Math.round(remaining), daysLeft };
}

function plantOverall(plant){
  let best = null;
  for(const {fruit} of allFruits(plant)){
    const v = fruitVisual(plant, fruit);
    if(!best || COLOR_PRIORITY[v.color] > COLOR_PRIORITY[best.color]) best = v;
  }
  return best || { label:'未着果', color:'gray', accum:0 };
}
function vineOverall(plant, vine){
  let best = null;
  plant.vines[vine].forEach(f => {
    const v = fruitVisual(plant, f);
    if(!best || COLOR_PRIORITY[v.color] > COLOR_PRIORITY[best.color]) best = v;
  });
  return best || { label:'未着果', color:'gray', accum:0 };
}

/* ===================== 気温取得 ===================== */
async function fetchTemperature(){
  try{
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&daily=temperature_2m_mean&past_days=92&timezone=Asia%2FTokyo`;
    const res = await fetch(url);
    const data = await res.json();
    const times = data.daily.time, temps = data.daily.temperature_2m_mean;
    for(let i=0;i<times.length;i++){
      const d = times[i], v = temps[i];
      if(v == null) continue;
      const existing = state.tempLog[d];
      if(!existing || !existing.manual){
        state.tempLog[d] = { value: v, manual:false };
      }
    }
    saveData();
  }catch(e){
    console.warn('気温取得に失敗', e);
  }
  renderHeaderTemp();
}
function renderHeaderTemp(){
  const rec = state.tempLog[todayStr()];
  const el = document.getElementById('tempVal');
  el.textContent = rec != null ? `${rec.value.toFixed ? rec.value.toFixed(1) : rec.value}℃` : '--.-℃';
  // 日付表示
  const d = new Date();
  const dateEl = document.getElementById('headerDate');
  if(dateEl) dateEl.textContent = `${d.getMonth()+1}月${d.getDate()}日`;
}
document.getElementById('tempVal').addEventListener('click', () => {
  const cur = state.tempLog[todayStr()];
  const input = prompt('本日の気温（℃）を手動入力してください', cur ? cur.value : '');
  if(input === null || input.trim() === '') return;
  const v = parseFloat(input);
  if(isNaN(v)) return alert('数値を入力してください');
  state.tempLog[todayStr()] = { value:v, manual:true };
  saveData(); renderAll();
});
// 気温更新ボタンは管理パネルから呼ぶ

/* ===================== レンダリング ===================== */
function blocks(){
  const chunks = [];
  for(let i=0;i<state.plants.length;i+=10) chunks.push(state.plants.slice(i,i+10));
  return chunks;
}

function renderSummary(){
  let red=0,gold=0,green=0,total=0;
  for(const p of state.plants){
    for(const {fruit} of allFruits(p)){
      if(fruit.mark === 'none' && !fruit.date) continue;
      total++;
      const v = fruitVisual(p, fruit);
      if(v.color==='red') red++;
      else if(v.color==='gold') gold++;
      else if(v.color==='green') green++;
    }
  }
  document.getElementById('summary').innerHTML = `
    <div class="box red"><div class="ico">🍉</div><div class="num">${red}</div><div class="lbl">収穫適期</div></div>
    <div class="box gold"><div class="ico">⏰</div><div class="num">${gold}</div><div class="lbl">まもなく</div></div>
    <div class="box green"><div class="ico">🌱</div><div class="num">${green}</div><div class="lbl">生育中</div></div>
    <div class="box"><div class="ico">🌼</div><div class="num">${total}</div><div class="lbl">総着果数</div></div>
  `;
}

function renderBlockNav(){
  const bs = blocks();
  const nav = document.getElementById('blockNav');
  if(currentBlock >= bs.length) currentBlock = Math.max(0, bs.length-1);
  if(bs.length === 0){ nav.innerHTML = ''; return; }
  // 班名でラベリング（グループ名を優先）
  nav.innerHTML = bs.map((b, i) => {
    const hasRed = b.some(p => plantOverall(p).color === 'red');
    const label = b[0]?.group || `区画${i+1}`;
    return `<button class="block-btn ${i===currentBlock?'active':''}" data-i="${i}">${label}${hasRed?'<span class="dot"></span>':''}</button>`;
  }).join('');
  nav.querySelectorAll('.block-btn').forEach(btn => {
    btn.addEventListener('click', () => { currentBlock = parseInt(btn.dataset.i); renderAll(); });
  });
}

function renderPlantGrid(){
  const grid = document.getElementById('plantGrid');
  const bs = blocks();
  const list = bs[currentBlock] || [];
  if(list.length === 0){
    grid.innerHTML = `<div class="empty">株がまだありません<br><button class="empty-cta" id="emptyAdd">＋ 最初の株を追加</button></div>`;
    grid.querySelector('#emptyAdd')?.addEventListener('click', () => document.getElementById('addOverlay').classList.add('show'));
    return;
  }
  grid.innerHTML = list.map(p => {
    const overall = plantOverall(p);
    const dot = (vine) => p.vines[vine].map((f,i) => {
      const v = fruitVisual(p,f);
      return `<div class="card-dot ${v.color}" title="${vine}${i+1}番果 ${v.label}">${i+1}</div>`;
    }).join('');
    let barFruit = null;
    allFruits(p).forEach(({fruit}) => {
      if(!fruit.date || fruit.mark==='x' || fruit.harvested) return;
      const v = fruitVisual(p,fruit);
      if(!barFruit || v.accum > barFruit.accum) barFruit = v;
    });
    const icon = STATUS_ICON[overall.label] || '🌑';
    return `<div class="plant-card ${overall.color==='red'?'pulse':''}" data-id="${p.id}">
      <div class="card-head ${overall.color}">
        <div class="card-no">No.${p.no}</div>
        ${p.group?`<div class="card-group-tag">${p.group}</div>`:''}
        <div class="card-status-row">
          <span class="card-status-icon">${icon}</span>
          <span class="card-status-text">${overall.label}</span>
        </div>
      </div>
      <div class="card-body">
        <div class="card-vine-row"><span class="card-vine-lbl">西</span><div class="card-dots">${dot('西')}</div></div>
        <div class="card-vine-row"><span class="card-vine-lbl">東</span><div class="card-dots">${dot('東')}</div></div>
        <div class="card-accum">${barFruit ? `🌡 ${barFruit.accum}℃ / ${p.target}℃` : '受粉前'}</div>
      </div>
    </div>`;
  }).join('');
  grid.querySelectorAll('.plant-card').forEach(el => {
    el.addEventListener('click', () => openDetail(parseInt(el.dataset.id)));
  });
}

/* ===================== 圃場マップ（3本仕立て 千鳥畝ビュー） ===================== */
function renderFieldMap(){
  const wrap = document.getElementById('mapWrap');
  if(state.plants.length === 0){ wrap.innerHTML = '<div class="empty">株がありません</div>'; return; }

  const groups = {};
  for(const p of state.plants){
    const g = p.group || '未分類';
    if(!groups[g]) groups[g] = [];
    groups[g].push(p);
  }

  // ドット生成
  function dot(plant, fruit, vineName, fruitIdx){
    const v = fruitVisual(plant, fruit);
    const dateStr = fruit.date ? fruit.date.slice(5).replace('-','/') : '';
    const tip = `${vineName} ${fruitIdx+1}番果\n${v.label}${dateStr?' ('+dateStr+')':''}`;
    return `<div class="fp-dot ${v.color}" title="${tip}"></div>`;
  }
  // 西側ドット列（右寄せ）
  function wDots(plant, vineKey){
    const fruits = plant.vines[vineKey] || [];
    return `<div class="fp-w">${[...fruits].reverse().map((f,i) => dot(plant, f, vineKey, 5-i)).join('')}</div>`;
  }
  // 東側ドット列（左寄せ）
  function eDots(plant, vineKey){
    const fruits = plant.vines[vineKey] || [];
    return `<div class="fp-e">${fruits.map((f,i) => dot(plant, f, vineKey, i)).join('')}</div>`;
  }
  const emW = `<div class="fp-w"></div>`;
  const emE = `<div class="fp-e"></div>`;
  const emC = `<div class="fp-ctr"></div>`;

  // コンパス＋凡例
  let html = `
    <div class="map-compass">
      <div class="cmp-w">← 西</div>
      <div class="cmp-center">
        <span class="map-legend-dot"><span style="background:var(--red)"></span>収穫適期</span>
        <span class="map-legend-dot"><span style="background:var(--gold)"></span>まもなく</span>
        <span class="map-legend-dot"><span style="background:var(--green)"></span>生育中</span>
        <span class="map-legend-dot"><span style="background:var(--blue)"></span>着果</span>
        <span class="map-legend-dot"><span style="background:#c0c4b8"></span>未着果</span>
      </div>
      <div class="cmp-e">東 →</div>
    </div>
  `;

  for(const g of Object.keys(groups)){
    const plantHtml = groups[g].map((p) => {
      const overall = plantOverall(p);
      const noCol = overall.color==='red' ? 'col-red' : overall.color==='gold' ? 'col-gold' : '';
      const pulseCls = overall.color==='red' ? 'pulse' : '';
      const noDiv = `<div class="fp-ctr"><div class="fp-no ${noCol} ${pulseCls}">${p.no}</div></div>`;

      const extra2west = p.extraSide ? p.extraSide === '西' : (p.no % 2 === 1);
      const evenCls = !extra2west ? 'fp-even' : '';
      const curLabel = extra2west ? '西2・東1' : '東2・西1';
      const flipBtn = `<div class="fp-flip"><button class="fp-flip-btn" data-id="${p.id}">${curLabel} ⇄</button></div>`;

      let rowA, rowB, rowC;
      if(extra2west){
        rowA = `<div class="fp-row"><span class="fp-vlabel">西①</span>${wDots(p,'西')}${emC}${emE}</div>`;
        rowB = `<div class="fp-row">${emW}${noDiv}${eDots(p,'東')}<span class="fp-vlabel">東</span></div>`;
        rowC = `<div class="fp-row"><span class="fp-vlabel">西②</span>${wDots(p,'sub')}${emC}${emE}</div>`;
      } else {
        rowA = `<div class="fp-row">${emW}${emC}${eDots(p,'東')}<span class="fp-vlabel">東①</span></div>`;
        rowB = `<div class="fp-row"><span class="fp-vlabel">西</span>${wDots(p,'西')}${noDiv}${emE}</div>`;
        rowC = `<div class="fp-row">${emW}${emC}${eDots(p,'sub')}<span class="fp-vlabel">東②</span></div>`;
      }

      // 株情報（受粉日・積算温度プログレスバー・残り日数）
      const info = estimatePlantInfo(p);
      let infoHtml = '';
      if(info){
        const dateDisp = info.date ? info.date.slice(5).replace('-','/') : '';
        const ratio = Math.min(1, info.accum / p.target);
        const pct = Math.round(ratio * 100);
        const barColor = info.remaining <= 0 ? 'red' : info.remaining < p.target*0.15 ? 'gold' : 'green';
        let daysHtml = '';
        if(info.remaining <= 0){
          daysHtml = `<div class="fp-info-days overdue">🔴 収穫適期!</div>`;
        } else if(info.daysLeft != null){
          const cls = info.daysLeft <= 5 ? 'soon' : 'growing';
          daysHtml = `<div class="fp-info-days ${cls}">あと約${info.daysLeft}日</div>`;
        }
        infoHtml = `<div class="fp-info">
          ${dateDisp ? `<div class="fp-info-date">🌸${dateDisp}</div>` : ''}
          <div class="fp-accum-wrap">
            <div class="fp-accum-bar"><div class="fp-accum-fill ${barColor}" style="width:${pct}%"></div></div>
            <div class="fp-accum-text">${info.accum}℃</div>
          </div>
          ${daysHtml}
        </div>`;
      }

      return `<div class="fp ${evenCls}" data-id="${p.id}">${rowA}${rowB}${rowC}${flipBtn}${infoHtml}</div>`;
    }).join('');

    html += `<div class="map-group"><div class="map-group-title">🌾 ${g}</div><div class="field-lane">${plantHtml}</div></div>`;
  }

  wrap.innerHTML = html;

  // 株タップ → 詳細
  wrap.querySelectorAll('.fp[data-id]').forEach(el => {
    el.addEventListener('click', e => {
      if(e.target.classList.contains('fp-flip-btn')) return;
      openDetail(parseInt(el.dataset.id));
    });
  });
  // ツル方向ミストグル
  wrap.querySelectorAll('.fp-flip-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const p = state.plants.find(x => x.id === parseInt(btn.dataset.id));
      if(!p) return;
      const defaultExtra2west = p.no % 2 === 1;
      const curExtra2west = p.extraSide ? p.extraSide==='西' : defaultExtra2west;
      // トグル: 現在の逆に設定。デフォルトと同じになる場合はnullに戻す
      const next = !curExtra2west;
      p.extraSide = (next === defaultExtra2west) ? null : (next ? '西' : '東');
      saveData();
      renderFieldMap();
    });
  });
}

    <div class="field">
      <span class="status-pill" style="background:var(--${v.color});">${STATUS_ICON[v.label]||''} ${v.label}</span>
      <span style="font-size:13px;color:#666;margin-left:8px;">積算温度: ${v.accum} ℃ / 目標 ${p.target} ℃</span>
    </div>
  `;
  document.getElementById('markSelect').addEventListener('change', e => {
    f.mark = e.target.value;
    saveData(); renderDetail(); renderAll();
  });
  document.getElementById('pollDateInput').addEventListener('change', e => {
    f.date = e.target.value;
    if(f.date && f.mark === 'none') f.mark = 'o';
    saveData(); renderDetail(); renderAll();
  });
  document.getElementById('harvestedCheck').addEventListener('change', e => {
    f.harvested = e.target.checked;
    saveData(); renderDetail(); renderAll();
  });
}
document.getElementById('targetTempInput').addEventListener('change', e => {
  const p = state.plants.find(x => x.id === detailPlantId);
  if(!p) return;
  const v = parseFloat(e.target.value);
  p.target = isNaN(v) ? DEFAULT_TARGET : v;
  saveData(); renderDetail(); renderAll();
});
document.getElementById('btnDeletePlant').addEventListener('click', () => {
  if(!confirm('この株を削除しますか？')) return;
  state.plants = state.plants.filter(x => x.id !== detailPlantId);
  saveData(); closeDetail(); renderAll();
});

/* ===================== 株追加 ===================== */
document.getElementById('btnAddPlant').addEventListener('click', () => {
  const maxNo = state.plants.reduce((m,p) => Math.max(m,p.no), 0);
  document.getElementById('newNo').value = maxNo + 1;
  document.getElementById('newGroup').value = '';
  document.getElementById('addOverlay').classList.add('show');
});
document.getElementById('closeAdd').addEventListener('click', () => {
  document.getElementById('addOverlay').classList.remove('show');
});
document.getElementById('btnConfirmAdd').addEventListener('click', () => {
  const no = parseInt(document.getElementById('newNo').value) || 1;
  const group = document.getElementById('newGroup').value.trim();
  const maxId = state.plants.reduce((m,p) => Math.max(m,p.id), 0);

/* ===================== 一括編集 ===================== */
function bulkFruitCell(p, vine, idx){
  const f = p.vines[vine][idx];
  return `<td>
    <select class="bulk-mark" data-id="${p.id}" data-vine="${vine}" data-idx="${idx}">
      <option value="none" ${f.mark==='none'?'selected':''}>未</option>
      <option value="x" ${f.mark==='x'?'selected':''}>×</option>
      <option value="o" ${f.mark==='o'?'selected':''}>○</option>
    </select><br>
    <input type="date" class="bulk-date" data-id="${p.id}" data-vine="${vine}" data-idx="${idx}" value="${f.date||''}">
  </td>`;
}
function renderBulkEdit(){
  const bs = blocks();
  const list = bs[currentBlock] || [];
  const wrap = document.getElementById('bulkWrap');
  if(list.length === 0){ wrap.innerHTML = '<div class="empty">株がありません</div>'; return; }
  let html = '<table class="bulk"><thead><tr><th>株</th><th>班</th><th>目標℃</th>';
  for(let i=6;i>=1;i--) html += `<th>西${i}</th>`;
  for(let i=1;i<=6;i++) html += `<th>東${i}</th>`;
  html += '</tr></thead><tbody>';
  for(const p of list){
    html += `<tr><td class="plantname-cell">${plantLabel(p)}</td>`;
    html += `<td><input type="text" data-id="${p.id}" class="bulk-group" value="${p.group||''}"></td>`;
    html += `<td><input type="number" data-id="${p.id}" class="bulk-target" value="${p.target}" style="width:46px;"></td>`;
    for(let i=5;i>=0;i--) html += bulkFruitCell(p, '西', i);
    for(let i=0;i<6;i++) html += bulkFruitCell(p, '東', i);
    html += '</tr>';
  }
  html += '</tbody></table>';
  wrap.innerHTML = html;

  wrap.querySelectorAll('.bulk-target').forEach(el => el.addEventListener('change', e => {
    const p = state.plants.find(x => x.id === parseInt(e.target.dataset.id));
    const v = parseFloat(e.target.value);
    p.target = isNaN(v) ? DEFAULT_TARGET : v;
    saveData(); renderSummary(); renderBlockNav();
  }));
  wrap.querySelectorAll('.bulk-group').forEach(el => el.addEventListener('change', e => {
    const p = state.plants.find(x => x.id === parseInt(e.target.dataset.id));
    p.group = e.target.value.trim();
    saveData();
  }));
  wrap.querySelectorAll('.bulk-mark').forEach(el => el.addEventListener('change', e => {
    const p = state.plants.find(x => x.id === parseInt(e.target.dataset.id));
    const f = p.vines[e.target.dataset.vine][parseInt(e.target.dataset.idx)];
    f.mark = e.target.value;
    saveData(); renderSummary(); renderBlockNav();
  }));
  wrap.querySelectorAll('.bulk-date').forEach(el => el.addEventListener('change', e => {
    const p = state.plants.find(x => x.id === parseInt(e.target.dataset.id));
    const f = p.vines[e.target.dataset.vine][parseInt(e.target.dataset.idx)];
    f.date = e.target.value;
    if(f.date && f.mark === 'none') f.mark = 'o';
    saveData(); renderBulkEdit(); renderSummary(); renderBlockNav();
  }));
}

/* ===================== データ取込（着果調査シートの貼り付け） ===================== */
// 画像(2026/6/15 調査票)から読み取った1班データ
const IMAGE_DATA_2026_0615 = [
  '1班\t\t\t\t×\t×\t×\t1\t×\t×\t×\t\t\t',
  '\t\t\t○\t×\t×\t×\t\t\t\t\t\t\t',
  '1班\t\t\t\t\t×\t×\t2\t×\t\t×\t\t\t',
  '\t\t\t\t×\t×\t×\t\t2026/5/22\t×\t○\t\t\t',
  '1班\t\t\t\t2026/5/31\t×\t×\t3\t×\t×\t×\t\t\t',
  '\t\t\t\t2026/5/31\t×\t×\t\t×\t×\t×\t\t\t',
  '1班\t\t\t2026/5/31\t2026/5/26\t×\t×\t4\t×\t2026/5/31\t\t\t\t',
  '\t\t\t\t\t\t\t\t×\t\t2026/5/31\t\t\t',
  '1班\t\t\t\t×\t×\t×\t5\t\t×\t2026/5/31\t\t\t',
  '\t\t\t\t×\t2026/5/31\t2026/5/26\t\t\t\t\t\t\t',
  '1班\t\t\t\t×\t×\t×\t6\t×\t×\t2026/5/15\t2026/5/31\t2026/5/31\t',
  '\t\t\t\t×\t×\t×\t\t×\t×\t2026/5/25\t\t\t',
  '1班\t\t\t\t○\t×\t×\t7\t×\t2026/5/31\t2026/5/31\t\t\t',
  '\t\t\t\t○\t×\t×\t\t\t\t\t\t\t',
  '1班\t\t\t\t○\t×\t×\t8\t×\t2026/5/31\t○\t\t\t',
  '\t\t\t\t\t\t\t\t×\t2026/5/15\t×\t\t\t',
  '1班\t\t\t2026/5/25\t×\t×\t×\t9\t×\t2026/5/20\t×\t\t\t',
  '\t\t\t\t2026/5/21\t×\t\t\t\t\t\t\t\t',
  '1班\t\t\t2026/5/31\t2026/5/25\t×\t×\t10\t×\t×\t2026/5/31\t\t\t',
  '\t\t\t\t\t×\t\t\t×\t2026/5/31\t2026/5/31\t\t\t',
].join('\n');

document.getElementById('btnImport').addEventListener('click', () => {
  document.getElementById('importText').value = '';
  document.getElementById('importResult').textContent = '';
  document.getElementById('importOverlay').classList.add('show');
});
document.getElementById('closeImport').addEventListener('click', () => {
  document.getElementById('importOverlay').classList.remove('show');
});
function parseCellValue(raw){
  const s = (raw||'').trim();
  if(s === '') return { mark:'none', date:'' };
  if(s === '×' || s.toLowerCase() === 'x') return { mark:'x', date:'' };
  if(s === '○' || s.toLowerCase() === 'o') return { mark:'o', date:'' };
  const m = s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})$/);
  if(m){
    const iso = `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
    return { mark:'o', date: iso };
  }
  return { mark:'none', date:'' };
}
function parseImportText(text){
  const rawLines = text.split('\n').map(l => l.trimEnd());
  // 空行除去せずに全行取得（原票フォーマット判定に必要）
  const allCols = rawLines.map(l => {
    const c = l.includes('\t') ? l.split('\t') : l.split(',');
    return c.map(s => s.trim());
  });

  // フォーマット判定: 原票形式 = col[7]が純粋な数値でcol[0]が純粋な数値でない
  // 原票形式: [班, 西6, 西5, 西4, 西3, 西2, 西1, No., 東1, 東2, 東3, 東4, 東5, 東6]
  function isOriginalFormat(cols){
    return cols.length >= 8 && !/^\d+$/.test(cols[0]) && /^\d+$/.test(cols[7]);
  }

  // 2行1株のマージ: 日付 > ○ > × > 空欄 の優先度で採用
  function cellScore(v){
    v = (v||'').trim();
    if(!v) return 0;
    if(v==='×'||v.toLowerCase()==='x') return 1;
    if(v==='○'||v.toLowerCase()==='o') return 2;
    if(/^\d{4}/.test(v)) return 3; // 受粉日付
    return 0;
  }
  function mergeCols(rowA, rowB, start, len){
    const result = [];
    for(let i = 0; i < len; i++){
      const a = (rowA[start+i] || '').trim();
      const b = (rowB ? (rowB[start+i] || '') : '').trim();
      result.push(cellScore(a) >= cellScore(b) ? (a || b) : b);
    }
    return result;
  }

  const plants = [];
  let skipped = 0;
  let nextId = 1;

  // 先頭の有効行でフォーマット判定
  // 原票形式はtrimEnd()で末尾タブが消えるため最小8列で検出（班+西6〜西1+No.）
  const firstValid = allCols.find(c => c.length >= 8);
  const useOrigFmt = firstValid && isOriginalFormat(firstValid);

  if(useOrigFmt){
    // 原票フォーマット: No.がcol[7]、1株2行ペア
    // ヘッダー行（「No.」という文字を含む行）をスキップ
    const dataLines = allCols.filter(c => {
      const joined = c.join('');
      if(/^[\s　]*$/.test(joined)) return false; // 完全空行
      if(c.some(s => /^No[．.]?$/.test(s))) return false; // ヘッダー行
      return true;
    });

    let i = 0;
    while(i < dataLines.length){
      const rowA = dataLines[i];
      const noA = parseInt(rowA[7] || '');
      if(isNaN(noA)){ i++; skipped++; continue; }

      // 次行がRow B（col[7]が空）かチェック
      const rowB = (i+1 < dataLines.length && isNaN(parseInt((dataLines[i+1][7]||'')))) ? dataLines[i+1] : null;

      const group = (rowA[0] || '').trim();
      // 西cols: col[1..6] = 西6,西5,西4,西3,西2,西1 → reverse → 西1..西6
      const westRaw = mergeCols(rowA, rowB, 1, 6).reverse(); // 西1番果がindex0
      // 東cols: col[8..13] = 東1,東2,東3,東4,東5,東6
      const eastRaw = mergeCols(rowA, rowB, 8, 6);

      const plant = newPlant(nextId++, noA, group);
      plant.vines.西 = westRaw.map(v => { const c=parseCellValue(v); return {mark:c.mark,date:c.date,harvested:false}; });
      plant.vines.東 = eastRaw.map(v => { const c=parseCellValue(v); return {mark:c.mark,date:c.date,harvested:false}; });
      plants.push(plant);

      i += rowB ? 2 : 1;
    }
  } else {
    // テンプレートフォーマット: No.がcol[0]
    for(const trimmed of allCols){
      if(trimmed.length < 13) continue;
      const no = parseInt(trimmed[0]);
      if(isNaN(no)){ skipped++; continue; }
      let rest = trimmed.slice(1);
      let group = '';
      if(rest.length >= 13){
        group = rest[0];
        rest = rest.slice(1);
      }
      if(rest.length < 12){ skipped++; continue; }
      const westRaw = rest.slice(0,6);
      const eastRaw = rest.slice(6,12);
      const westAsc = [...westRaw].reverse().map(parseCellValue);
      const eastAsc = eastRaw.map(parseCellValue);
      const plant = newPlant(nextId++, no, group);
      plant.vines.西 = westAsc.map(c => ({ mark:c.mark, date:c.date, harvested:false }));
      plant.vines.東 = eastAsc.map(c => ({ mark:c.mark, date:c.date, harvested:false }));
      plants.push(plant);
    }
  }
  return { plants, skipped };
}
document.getElementById('btnLoadImageData').addEventListener('click', () => {
  document.getElementById('importText').value = IMAGE_DATA_2026_0615;
  const { plants, skipped } = parseImportText(IMAGE_DATA_2026_0615);
  document.getElementById('importResult').textContent =
    `${plants.length}株を読み取りました（画像 2026/6/15 調査票 1班 No.1〜10）`;
});
document.getElementById('importText').addEventListener('input', e => {
  const { plants, skipped } = parseImportText(e.target.value);
  document.getElementById('importResult').textContent =
    plants.length > 0 ? `${plants.length}株を読み取りました${skipped>0 ? '（'+skipped+'行は形式が合わず無視されました）' : ''}` : '';
});
document.getElementById('btnDoImport').addEventListener('click', () => {
  const { plants, skipped } = parseImportText(document.getElementById('importText').value);
  if(plants.length === 0){ alert('読み取れる行がありませんでした。形式を確認してください。'); return; }
  if(!confirm(`${plants.length}株のデータを取り込み、既存のデータを置き換えます。よろしいですか？${skipped>0 ? '\n('+skipped+'行は無視されます)' : ''}`)) return;
  state.plants = plants;
  saveData();
  currentBlock = 0;
  document.getElementById('importOverlay').classList.remove('show');
  renderAll();
});
